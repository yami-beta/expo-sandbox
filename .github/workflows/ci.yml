name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node

      - name: Run Oxlint
        run: pnpm -r run lint:oxlint --format=github

      - name: Run expo lint
        run: pnpm -r run lint:expo

      - name: Check formatting
        run: pnpm -r run lint:oxfmt

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node

      - name: Run tests
        run: pnpm -r run test
